name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Ping mỗi 10 phút
  workflow_dispatch: # Cho phép chạy thủ công

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://lion-shop-backend.onrender.com/health-check)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
